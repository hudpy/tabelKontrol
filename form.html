<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Input Materi</title>
</head>
<body>
	<h2>Tambah Data</h2>
	<form id="formMateri">
		<label>Tanggal</label>
		<input type="date" id="tanggal">
		<label>Kelas</label>
		<input type="text" id="kelas">
		<label>Keterangan</label>
		<textarea id="keterangan" rows="5" required></textarea>
		<br><br>
		<button type="submit">Simpan</button>
	</form>
	<script>
		const API_URL="https://script.google.com/macros/s/AKfycby_qEGM6xJm9d9y4mNU8riXxJc6BIVr54lj-CJmIYDZwk-p4o-oA81Ve0YiBllvwIeJNQ/exec";
		document
			.getElementById("formMateri")
			.addEventListener("submit", async function(e){

    			e.preventDefault();

    			const params =
      				new URLSearchParams({

        			action:"create",

        tanggal:
          document
          .getElementById("tanggal")
          .value,

        kelas:
          document
          .getElementById("kelas")
          .value,

        keterangan:
          document
          .getElementById("keterangan")
          .value
      });

    await fetch(
      `${API_URL}?${params}`
    );

    alert("Berhasil");

    this.reset();
});

	</script>
</body>
</html>
