<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Edit Materi</title>
</head>
<body>
	<h2>Edit Data</h2>
	<form id="formEdit">
		<p>Tanggal</p>
		<input type="date" id="tanggal" required>
		<p>Kelas</p>
		<input type="text" id="kelas" required>
		<p>Keterangan</p>
		<textarea id="keterangan" rows="5" required></textarea>
		<br><br>
		<button type="submit">Update</button>
	</form>
	<script>
		const API_URL="https://script.google.com/macros/s/AKfycby_qEGM6xJm9d9y4mNU8riXxJc6BIVr54lj-CJmIYDZwk-p4o-oA81Ve0YiBllvwIeJNQ/exec";
		
		const params=new URLSearchParams(location.search);
		
		const id=params.get("id");
		
		async function loadData(){
			const response=await fetch(`${API_URL}?action=get&id=${id}`);
			const data=await response.json();
			document.getElementById("tanggal").value=data.tanggal;
			document.getElementById("kelas").value=data.kelas;
			document.getElementById("keterangan").value=data.keterangan;
		}
		
		document.getElementById("formEdit").addEventListener("submit",async function(e){
			e.preventDefault();
			await fetch(`${API_URL}?${params}`);
			alert("Data berhasil diupdate");
			location.href="daftar.html";
		});
		
		loadData();
	</script>
</body>
</html>
